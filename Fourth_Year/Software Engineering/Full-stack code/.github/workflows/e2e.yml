name: Frontend E2E Tests

on:
  push:
    branches: [ main, dev, pre_prod ]
  pull_request:

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------- BACKEND ---------------
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Start backend
        working-directory: ./backend
        run: |
          mvn -q -DskipTests spring-boot:run > backend.log 2>&1 &
          sleep 20
          if ! pgrep -f "spring-boot:run" > /dev/null; then
            echo "❌ Backend no arrancó. Logs:"
            cat backend.log
            exit 1
          fi
        env:
          SPRING_PROFILES_ACTIVE: test
          SPRING_DATASOURCE_URL: ${{ secrets.TEST_DB_URL }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.TEST_DB_USER }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.TEST_DB_PASS }}

      # --------------- FRONTEND ---------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend (production)
        working-directory: ./frontend
        run: npm run build

      - name: Start static frontend server
        working-directory: ./frontend
        run: |
          npx serve -s build -l 3000 > frontend.log 2>&1 &
          sleep 5
          if ! pgrep -f "serve -s build" > /dev/null; then
            echo "❌ Frontend no arrancó. Logs:"
            cat frontend.log
            exit 1
          fi

      - name: Wait for services
        run: npx wait-on http://localhost:3000

      # --------------- PLAYWRIGHT ---------------
      - name: Install Playwright browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: ./frontend
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
        run: npx playwright test --reporter=html

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7

      - name: Upload backend log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-log
          path: backend/backend.log

      - name: Upload frontend log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-log
          path: frontend/frontend.log
