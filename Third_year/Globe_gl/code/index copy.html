        <div id="legendContainer">

          <div id="legendRange"></div>

    <script type="module">
      import * as THREE from 'https://esm.sh/three';

      import { transparentize } from 'https://esm.sh/polished';
      import { scaleSequential } from 'https://esm.sh/d3-scale';
      import { interpolateRainbow } from 'https://esm.sh/d3-scale-chromatic';

      // Create new world
      const world = new Globe(document.getElementById('globeViz'));

      // Read the population data using the basic data parser
      let dataObject = await getDataFetch('./datasets/population909500.json', parseData);
      //let dataObject = await getDataFetch('./datasets/airports.json', parseData);

      function updateLegend(scale, minWeight, maxWeight) {
        const midWeight = (minWeight + maxWeight) / 2;
        const legendRangeContainer = document.getElementById('legendRange');
        legendRangeContainer.innerHTML = `
          <div id="legendLabels" style="display: flex; justify-content: space-between; width: 100%;">
            <span style="text-align:left;">${formatShort(minWeight)}</span>
            <span style="text-align:center;">${formatShort(midWeight)}</span>
            <span style="text-align:right;">${formatShort(maxWeight)}</span>
          </div>
        `;

        const canvas = document.getElementById('legendCanvas');
        const ctx = canvas.getContext('2d');

        // Make canvas responsive
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;

        // Create gradient
        const gradient = ctx.createLinearGradient(0, 0, canvas.width, 0);
        const steps = 10;
        for (let i = 0; i <= steps; i++) {
          const t = i / steps;
          gradient.addColorStop(t, scale(t * (scale.domain()[1] - scale.domain()[0]) + scale.domain()[0]));
        }
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }

        const weightColor = scaleSequential(interpolateRainbow)
          .domain([minWeight, maxWeight])
          .clamp(false);
        
        // Example of a color scale for the points

            <div>Population: <em>${d.population}</em>m</div>
          </div>
        `;

              .pointColor(() => 'red') //weightColor(d.population))
              .pointRadius(0.2)
              .pointLabel(getTooltip)

            // Set the data by year

            // Set the legend

      }

      */

      if (method === 'points') {
        // Configure the world globe
        world
          .pointAltitude(() => 0.5) // Altura fija
          .pointColor(() => 'red')  // Color fijo
          .pointRadius(0.2)
          .pointLabel(getTooltip)
          .labelLat('lat')
          .labelLng('lng');

        // Set the data directly

        // No hay leyenda ni años, así que fuera
        // updateLegend(...);
      }


    }


      // Set the data by year
      async function handleYearHover(year) 
      {
        document.querySelectorAll('.year').forEach((el) => {
          if (el.id !== year) {
            el.classList.remove('active');
          }
        });
        document.getElementById(year).classList.add('active');
        // Take the active method, if none is active then use points by default
        let methodElement = document.querySelector('.vis.active');
        const method = methodElement ? methodElement.id : 'points';
        document.getElementById('yearTitle').innerHTML = `<b>World Population ${year}</b>`;
        mappingSelectedData(year, method);
      }

      // Set the method of visualization
      async function handleVisHover(method) 
      {
        document.querySelectorAll('.vis').forEach((el) => {
          if (el.id !== method) {
            el.classList.remove('active');
          }
        });
        document.getElementById(method).classList.add('active');
        const year = document.querySelector('.year.active').id;
        document.getElementById('visTitle').innerHTML = `<b>Method ${method}</b>`;
        mappingSelectedData(year, method);
      }

      // Set the initial year to 1990
      handleYearHover('1990');
      // Set the initial method to points
      handleVisHover('points');

      // Add event listeners for the year spans
      document.getElementById('1990').addEventListener('mouseover', () => handleYearHover('1990'));
      document.getElementById('1995').addEventListener('mouseover', () => handleYearHover('1995'));
      document.getElementById('2000').addEventListener('mouseover', () => handleYearHover('2000'));

      // Add event listeners for the visualization spans
      document.getElementById('points').addEventListener('mouseover', () => handleVisHover('points'));

      // Set the world texture and start the animation
      Promise.all([
        new THREE.TextureLoader().loadAsync('./resources/earth-day.jpg')
      ]).then(([texture]) => {
        const material = new THREE.ShaderMaterial({
          uniforms: {
            textureMap: { value: texture },
          },
          vertexShader: basicShaders.vertexShader,
          fragmentShader: basicShaders.fragmentShader
        });
        world.globeMaterial(material);
      });

      requestAnimationFrame(() =>
