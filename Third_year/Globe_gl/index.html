      // Create new world
      const world = new Globe(document.getElementById('globeViz'));

      // Read the population data using the basic data parser
      let dataObject = await getDataFetch('./datasets/countries.json', parseData);
      //let dataObject = await getDataFetch('./datasets/airports.json', parseData);

      function updateLegend(scale, minWeight, maxWeight) {
        const midWeight = (minWeight + maxWeight) / 2;
        const legendRangeContainer = document.getElementById('legendRange');
        legendRangeContainer.innerHTML = `
          <div id="legendLabels" style="display: flex; justify-content: space-between; width: 100%;">
            <span style="text-align:left;">${formatShort(minWeight)}</span>
            <span style="text-align:center;">${formatShort(midWeight)}</span>
            <span style="text-align:right;">${formatShort(maxWeight)}</span>
          </div>
        `;

        const canvas = document.getElementById('legendCanvas');
        const ctx = canvas.getContext('2d');

        // Make canvas responsive
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;

        // Create gradient
        const gradient = ctx.createLinearGradient(0, 0, canvas.width, 0);
        const steps = 10;
        for (let i = 0; i <= steps; i++) {
          const t = i / steps;
          gradient.addColorStop(t, scale(t * (scale.domain()[1] - scale.domain()[0]) + scale.domain()[0]));
        }
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }

      let currentField = 'currency'; // valor por defecto inicial

      // Visual Mapping of the data by the selected data and method
      async function mappingSelectedData(method, field) {


      // Limpia datos anteriores
      world.pointsData([]);
      world.hexPolygonsData([]);
      world.polygonsData([]);


      if (method === 'points') {

        const countriesGeoJson = await fetch('./datasets/area_country.geojson').then(res => res.json());

        const featuresWithValue = countriesGeoJson.features.map(f => {
          const countryName = f.properties.ADMIN;
          const value = dataObject[countryName]?.[field] || 'N/A';
          const lat = dataObject[countryName]?.lat;
          const lng = dataObject[countryName]?.lng;
          return { ...f, value, lat, lng };
        });

        const uniqueValues = [...new Set(featuresWithValue.map(f => f.value))];
        const colorScale = scaleOrdinal(schemeCategory10).domain(uniqueValues);

        world
          .pointAltitude(() => 0.05)
          .pointColor(d => colorScale(d.value))
          .pointRadius(0.34)
          .pointLabel(d => `<div>${capitalize(field)}: <em>${d.value}</em></div>`)
          .labelLat('lat')
          .labelLng('lng');

        world.pointsData(featuresWithValue);
      }


      else if (method === 'square') {
        const countriesGeoJson = await fetch('./datasets/area_country.geojson').then(res => res.json());

        const featuresWithValue = countriesGeoJson.features.map(f => {
          const countryName = f.properties.ADMIN;
          const value = dataObject[countryName]?.[field] || 'N/A';
          return { ...f, value };
        });

        const uniqueValues = [...new Set(featuresWithValue.map(f => f.value))];
        const colorScale = scaleOrdinal(schemeCategory10).domain(uniqueValues);


        world
          .hexPolygonsData(featuresWithValue)
          .hexPolygonResolution(4)
          .hexPolygonMargin(0)
          .hexPolygonUseDots(false)
          .hexPolygonColor(d => colorScale(d.value))
          .hexPolygonLabel(d => `
            <b>${d.properties.ADMIN} (${d.properties.ISO_A2})</b><br/>
            ${capitalize(field)}: <i>${d.value}</i>
          `);
          


      } else if (method === 'outline') {

        
          const countriesGeoJson = await fetch('./datasets/area_country.geojson').then(res => res.json());

          const featuresWithValue = countriesGeoJson.features.map(f => {
            const countryName = f.properties.ADMIN;
            const value = dataObject[countryName]?.[field] || 'N/A';
            return { ...f, value };
          });

          const uniqueValues = [...new Set(featuresWithValue.map(f => f.value))];
          const colorScale = scaleOrdinal(schemeCategory10).domain(uniqueValues);

          world
            .polygonsData(featuresWithValue)
            //.polygonCapColor(d => 1 - colorScale(d.value)) // relleno morado
            .polygonCapColor(() => 'rgba(0,0,0,0.55)') // relleno negro
            //.polygonCapColor(() => 'rgba(255,255,255,0.55)') // relleno blanco
            .polygonSideColor(() => 'rgba(255,0,0,0)') // sin borde lateral
            .polygonStrokeColor(d => colorScale(d.value)) // solo línea fina
            .polygonLabel(d => `
              <b>${d.properties.ADMIN} (${d.properties.ISO_A2})</b><br/>
              ${capitalize(field)}: <i>${d.value}</i>
            `)
            .polygonAltitude(0.3)
            .polygonStrokeWidth(0.2) // más gordo que el default (~0.1);
            ;
            
        }

              */



  }

  function capitalize(str) {
  return str.charAt(0).toUpperCase() + str.slice(1);
}




      // Set the data by data
      async function handledataHover(data) {
        document.querySelectorAll('.data').forEach((el) => {
          if (el.id !== data) {
            el.classList.remove('active');
          }
        });
        document.getElementById(data).classList.add('active');

        // Set new field based on clicked data
        if (data === 'Currency') currentField = 'currency';
        else if (data === 'Capital') currentField = 'capital';
        else if (data === 'Continent') currentField = 'continent';
        else if (data === 'Subcontinent') currentField = 'subcontinent';
        else if (data === 'Timezone') currentField = 'timezone';
        else if (data === 'PhoneCode') currentField = 'phonecode';

        let methodElement = document.querySelector('.vis.active');
        const method = methodElement ? methodElement.id : 'points';
        document.getElementById('dataTitle').innerHTML = `<b>World Information </b>`;

        mappingSelectedData(method, currentField);
      }




      async function handleVisHover(method) {
        document.querySelectorAll('.vis').forEach(el => el.classList.remove('active'));
        document.getElementById(method).classList.add('active');
        document.getElementById('visTitle').innerHTML = `<b>Method ${method}</b>`;

        mappingSelectedData(method, currentField);
      }



      // Set the initial method to points
      handleVisHover('outline');
      handledataHover('Currency');

      // Add event listeners for the data spans
      document.getElementById('Currency').addEventListener('mouseover', () => handledataHover('Currency'));
      document.getElementById('Capital').addEventListener('mouseover', () => handledataHover('Capital'));
      document.getElementById('Continent').addEventListener('mouseover', () => handledataHover('Continent'));
      document.getElementById('Subcontinent').addEventListener('mouseover', () => handledataHover('Subcontinent'));
      document.getElementById('Timezone').addEventListener('mouseover', () => handledataHover('Timezone'));
      document.getElementById('PhoneCode').addEventListener('mouseover', () => handledataHover('PhoneCode'));

      // Add event listeners for the visualization spans
      document.getElementById('points').addEventListener('mouseover', () => handleVisHover('points'));
      document.getElementById('square').addEventListener('mouseover', () => handleVisHover('square'));
      document.getElementById('outline').addEventListener('mouseover', () => handleVisHover('outline'));
      
      // TODO: Afegiu listeners d'esdeveniments per als mètodes aplicats

      // Set the world texture and start the animation
      Promise.all([
        new THREE.TextureLoader().loadAsync('./resources/earth-day.jpg')
      ]).then(([texture]) => {
        const material = new THREE.ShaderMaterial({
          uniforms: {
            textureMap: { value: texture },
          },
          vertexShader: basicShaders.vertexShader,
          fragmentShader: basicShaders.fragmentShader
        });
        world.globeMaterial(material);
      });

      requestAnimationFrame(() =>

          requestAnimationFrame(animate);
