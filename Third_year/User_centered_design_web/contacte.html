<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estils/base.css">
    <link rel="stylesheet" href="estils/contacte.css">
    <link rel="stylesheet" href="estils/header.css">
    <link rel="stylesheet" href="estils/footer.css">
    <title>Contacte</title>
</head>
<body>
    <header>
        <div style="display: flex; align-items: center; width: 100%; justify-content: space-between;">
            <!-- Logo a la izquierda -->
            <img src="imatges/logo.png" alt="Logo" style="height: 40px;">
    
            <!-- Menú centrado -->
            <nav style="flex-grow: 1; text-align: center;">
                <a href="inici.html">Inici</a>
                <a href="perfil.html">Perfil</a>
                <span style="text-decoration: underline; color: white; margin: 0 10px;">Contacte</span>
            </nav>
    
            <!-- Icono de cerrar sesión a la derecha -->
            <a href="#" style="color: white; text-decoration: none; font-size: 20px;">
                &#x274C; <!-- Icono de cerrar sesión -->
            </a>
        </div>
    </header>

    <main>
        <h2 style="text-align: center; margin-top: 15px; margin-bottom: 10px;">Envia'ns el teu feedback</h2>
        <p style="text-align: center; margin-bottom: 30px; color: #6a6a6a;">
            Si tens suggeriments o vols demanar una recepta concreta, omple el formulari següent:
        </p>
        <form action="#" method="post" class="form-container">
            <label for="name">Nom d'usuari</label>
            <input type="text" id="name" name="name" value="marialuisa" readonly>

            <label for="email">Correu electrònic</label>
            <input type="text" id="name" name="name" value="marilui@gmail.com" readonly>

            <label for="subject">Assumpte</label>
            <select id="subject" name="subject" required>
                <option value="feedback">Feedback general</option>
                <option value="new-recipe">Demana una nova recepta</option>
                <option value="other">Altres</option>
            </select>

            <label for="message">Missatge</label>
            <textarea id="message" name="message" rows="5" placeholder="Escriu el teu missatge aquí..." required></textarea>

            <button type="submit">Enviar</button>
        </form>

        <div id="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.15); z-index: 999;"></div>
        <div id="success-modal" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background-color: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3); text-align: center; z-index: 1000;">
            <p style="margin-bottom: 20px; color: #333; font-size: 16px;">Missatge enviat. Si escau, rebràs una resposta per correu pròximament.</p>
            <button id="close-modal" style="padding: 10px 20px; background-color: #F08B85; color: white; border: none; border-radius: 5px; cursor: pointer;">Tancar</button>
        </div>
    </main>

    <footer>
        &copy; FHiC 2025 - Sense Fre A Les Magdalenes
    </footer>
</body>

<script src="scripts/sendFeedback.js"></script>
</html>
